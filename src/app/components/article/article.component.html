<div class="article-form article__form">
    <form [formGroup]="articleForm" novalidate (ngSubmit)="submit()">
        <div class="article-form__item">
            <label for="title">Title</label>
            <textarea class="article-form__control" name="title" formControlName="articleTitle">
            </textarea>
        </div>
        <div class="article-form__item">
            <label for="content">Content</label>
            <textarea class="article-form__control" name="content" formControlName="articleContent">
            </textarea>
        </div>
        <button class="article-form__btn" [disabled]="articleForm.invalid">Submit</button>
    </form>
</div>
<ng-container *ngIf="(article$ | async) as article">
  <div class="article-detail">
    <h3>{{ article.id }}</h3>
    <h2>{{ article.title }}</h2>
    <div class="article-detail__content">{{ article.title }}</div>
  </div>
</ng-container>
